<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nokia Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header>
        <h1>Nokia Snake</h1>
        <p>Press <span class="key">Enter</span> to start or restart the game.</p>
      </header>
      <section class="screen">
        <canvas id="game" width="360" height="360" aria-label="Snake game board"></canvas>
        <div id="overlay" class="overlay" role="status" aria-live="polite"></div>
      </section>
      <footer>
        <p>
          Control snake with arrow keys.<br />Eat the blinking pixel fruit to grow. Avoid hitting the walls or
          yourself.
        </p>
      </footer>
    </main>
    <script src="snake.js" type="module"></script>
  </body>
</html>
